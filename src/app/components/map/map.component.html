<!-- Route selector bar — floats over map -->
<div class="map-topbar">
  <select class="map-route-select" [(ngModel)]="selectedRouteId" (ngModelChange)="onRouteChange($event)">
    <option value="">{{ 'MAP.SELECT_ROUTE' | translate }}</option>
    @for (r of routes(); track r.id) {
      <option [value]="r.id">{{ r.name }}</option>
    }
  </select>

  @if (selectedRouteId()) {
    <div class="live-chip" [class.has-drivers]="driverCount() > 0">
      @if (driverCount() > 0) {
        <span class="live-dot"></span>
        {{ driverCount() }} {{ 'MAP.LIVE_DRIVERS' | translate }}
      } @else {
        <span class="no-driver-dot"></span>
        {{ 'MAP.NO_LIVE_DRIVERS' | translate }}
      }
    </div>
  }
</div>

<!-- Full-screen Leaflet map -->
<div id="live-map" #liveMap></div>

<!-- Empty state overlay when no route selected -->
@if (!selectedRouteId()) {
  <div class="map-empty">
    <span class="map-empty-icon">🗺️</span>
    <p>{{ 'MAP.PICK_ROUTE' | translate }}</p>
  </div>
}
