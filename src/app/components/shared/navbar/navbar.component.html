<nav class="bottom-nav">
  <a
    routerLink="/home"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: true }"
    class="nav-item"
  >
    <span class="nav-icon">🏠</span>
    <span class="nav-label">{{ 'SHARED.HOME' | translate }}</span>
  </a>
  <a routerLink="/routes" routerLinkActive="active" class="nav-item">
    <span class="nav-icon">🚌</span>
    <span class="nav-label">{{ 'SHARED.ROUTES' | translate }}</span>
  </a>

  <!-- Passenger Only -->
  @if (isPassenger()) {
    <a routerLink="/waiting" routerLinkActive="active" class="nav-item nav-center-item">
      <div class="nav-waiting-circle">
        <span class="nav-icon-big">✋</span>
      </div>
    </a>

    <!-- Passenger: Live Map tab -->
    <a routerLink="/map" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">🗺️</span>
      <span class="nav-label">{{ 'SHARED.MAP' | translate }}</span>
    </a>
  } @else {
    <!-- Driver: On Duty toggle -->
    <button class="nav-item duty-btn" (click)="toggleDuty()" [class.duty-on]="isOnDuty">
      <div class="duty-circle" [class.duty-circle-on]="isOnDuty">
        <span class="nav-icon-big">🚌</span>
      </div>
      <span class="nav-label duty-label">{{
        (isOnDuty ? 'DRIVER.ON_DUTY' : 'DRIVER.OFF_DUTY') | translate
      }}</span>
    </button>

    <a routerLink="/driver/dashboard" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">{{ 'SHARED.DASHBOARD' | translate }}</span>
    </a>
  }

  <!-- Settings -->
  <a routerLink="/settings" routerLinkActive="active" class="nav-item">
    <span class="nav-icon">⚙️</span>
    <span class="nav-label">{{ 'SHARED.SETTINGS' | translate }}</span>
  </a>
</nav>
